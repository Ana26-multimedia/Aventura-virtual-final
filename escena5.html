  <p>Raluz empieza a bajar poco a poco riendose hasta ver la tierra otra vez.</p>

<style>
    #btn-narracion {
      position: fixed;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      background: #70a1ff;
      color: white;
      padding: 14px 25px;
      border-radius: 25px;
      font-family: 'Handlee', cursive;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
      z-index: 1000;
    }

    #btn-narracion:hover {
      transform: translateX(-50%) scale(1.1);
    }

    #btn-narracion:active {
      transform: translateX(-50%) scale(0.95);
    }
  </style>

 <div class="contenedor-pajaro">
        <div class="pajaro">
            <div class="pico"></div>
            <div class="cabeza"></div>
            <div class="ojo"></div>
            <div class="cuerpo"></div>
            <div class="ala"></div>
        </div>
    </div>
<br>
<br>
<br>

<div id="btn-narracion">🎙️ Narración</div>

<audio id="narracion" src="assets/Escena5-Audio.mp3"></audio>
  
    <script>
      
        const pajaro = document.querySelector('.pajaro');
        pajaro.addEventListener('click', () => {
            pajaro.classList.add('volando');
            setTimeout(() => {
                pajaro.classList.remove('volando');
            }, 12000);
        });

        const cometas = document.querySelectorAll('.cometa');
        cometas.forEach(cometa => {
            cometa.addEventListener('click', () => {
                cometa.classList.add('volar');
                setTimeout(() => {
                    cometa.classList.remove('volar');
                }, 2000);
            });
        });

        const btnNarracion = document.getElementById('btn-narracion');
const narracion = document.getElementById('narracion');

if (btnNarracion && narracion) {
  btnNarracion.addEventListener('click', () => {
    if (narracion.paused) {
      narracion.load(); // 
      narracion.play();
      btnNarracion.textContent = "⏸️ Pausar narración";
    } else {
      narracion.pause();
      btnNarracion.textContent = "🎙️ Narración";
    }
  });
}
    </script>

</body>
