<body id="escena6">

  <div class="texto">
    
<p>Entonces ve un atardecer rosado hermoso… y allí está Mía 🐦💖.</p>
<p>Raluz sonríe: su gran aventura ha sido increíble.</p>
  </div>

  <style>
    #btn-narracion {
      position: fixed;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      background: #70a1ff;
      color: white;
      padding: 14px 25px;
      border-radius: 25px;
      font-family: 'Handlee', cursive;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
      z-index: 1000;
    }

    #btn-narracion:hover {
      transform: translateX(-50%) scale(1.1);
    }

    #btn-narracion:active {
      transform: translateX(-50%) scale(0.95);
    }
  </style>

<br>
<b>
<br>

</b>
  <div class="links">
    <a href="escena5.html">Ir a escena 5</a>

<div class="contenedor-pajaro">
  <div class="pajaro">
    <div class="cuerpo"></div>
    <div class="cabeza"></div>
    <div class="ojo"></div>   
    <div class="pico"></div>
    <div class="ala"></div>
  </div>
</div>
  <div class="contenedor-pajaro2">
    <div class="pajaro2">
      <div class="cuerpo2"></div>
      <div class="cabeza2">
        <div class="ojo2"></div>
      </div>
      <div class="pico2"></div>
      <div class="ala2"></div>
    </div>
  </div>


  <div id="btn-narracion">🎙️ Narración</div>

<audio id="narracion" src="assets/Escena6-Audio.mp3"></audio>
  

  <video autoplay loop muted playsinline id="bg-video">
    <source src="assets/video-atardecer.mp4" type="video/mp4">
  </video>

  <script>
    const pajaro = document.querySelector('.pajaro');
    const pajaro2 = document.querySelector('.pajaro2');

    pajaro.addEventListener('click', () => {
      pajaro.classList.add('volando');
    });

    pajaro2.addEventListener('click', () => {
      pajaro2.classList.add('volando2');
    });
         const btnNarracion = document.getElementById('btn-narracion');
const narracion = document.getElementById('narracion');

if (btnNarracion && narracion) {
  btnNarracion.addEventListener('click', () => {
    if (narracion.paused) {
      narracion.load(); // 
      narracion.play();
      btnNarracion.textContent = "⏸️ Pausar narración";
    } else {
      narracion.pause();
      btnNarracion.textContent = "🎙️ Narración";
    }
  });
}
  </script>
