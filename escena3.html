<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>
<body id="escena3">
    <h1> Escena 3, capitulo 3</h1>

    <a href="escena2.html"> Volver a la escena anterior </a>
    <br>
    <a href="escena4.html"> Ir a escena 4</a>
    
    <br>

  <video id="bg-video" autoplay muted loop>
  <source src="./assets/video-nubes.mp4" type="video/mp4">
</video>

</video>

<div class="contenido">
  <br>
  
<p>Raluz ya se siente como todo un experto volando.</p>
<p>Cada vez sube más y más alto, como  jugando con el viento.</p>
<br>
<br>
<br>

<style>
#btn-narracion {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: #70a1ff;
  color: white;
  padding: 14px 25px;
  border-radius: 25px;
  font-family: 'Handlee', cursive;
  font-size: 18px;
  cursor: pointer;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  transition: 0.3s;
  z-index: 1000;
}

#btn-narracion:hover {
  transform: translateX(-50%) scale(1.1);
}

#btn-narracion:active {
  transform: translateX(-50%) scale(0.95);
}

</style>


</div>

<div class="contenedor-pajaro">
  <div class="pajaro">
    <div class="pico"></div>
    <div class="cabeza"></div>
    <div class="ojo"></div>
    <div class="cuerpo"></div>
    <div class="ala"></div>
  </div>
</div>


<div id="btn-narracion">🎙️ Narración</div>
<audio id="narracion" src="./assets/Escena3-Audio.mp3"></audio>

  <div class="nube"></div>

  <script>
const pajaro = document.querySelector('.pajaro');

pajaro.addEventListener('click', () => {
  pajaro.classList.add('volando');
});

const btnNarracion = document.getElementById('btn-narracion');
const narracion = document.getElementById('narracion');

if (btnNarracion && narracion) {
  btnNarracion.addEventListener('click', () => {
    if (narracion.paused) {
      narracion.play();
      btnNarracion.textContent = "⏸️ Pausar narración";
    } else {
      narracion.pause();
      btnNarracion.textContent = "🎙️ Escuchar narración";
    }
  });
}
</script>


</body>
</html>
