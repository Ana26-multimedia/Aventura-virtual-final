<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Cohete</title>
  <link rel="stylesheet" href="style.css">
</head>

<script src="script.js"></script>

<body id="escena4">

  <h1>Escena 4, capítulo 4</h1>

  <a href="escena3.html">Volver a escena anterior</a><br><br>
  <a href="escena5.html">Ir a escena 5</a>


  <button id="launchBtn">🚀 Despegar 🔥</button>

<div class="rocket-container" id="cohete">
  <div class="rocket">
    <div class="nose"></div>
    <div class="body">
      <div class="window"></div>
    </div>
    <div class="fin fin-left"></div>
    <div class="fin fin-right"></div>
  </div>
</div>

<script>
  const cohete = document.getElementById("cohete");
  const boton = document.getElementById("launchBtn");

  boton.addEventListener("click", () => {
    cohete.classList.remove("despegar");
    void cohete.offsetWidth;
    cohete.classList.add("despegar");
  });
</script>

<div class="contenedor-pajaro">
  <div class="pajaro">
    <div class="pico"></div>
    <div class="cabeza"></div>
    <div class="ojo"></div>
    <div class="cuerpo"></div>
    <div class="ala"></div>
  </div>
</div>
